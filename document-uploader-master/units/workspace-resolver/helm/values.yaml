workloadName: workspace-resolver
iamRoleArn: ""            # supplied by overlay from platform-iam-and-security output
image:
  repository: ""          # supplied by overlay from platform-network-and-compute ECR output
  tag: "0.1.0"
  pullPolicy: IfNotPresent
otlp:
  endpoint: "http://grafana-alloy.observability.svc.cluster.local:4317"
  serviceNamespace: "docuploader"
environment: sandbox
replicaCount: 2
resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: 250m
    memory: 256Mi
extraEnv:
  - name: LISTEN_ADDR
    value: ":50051"
probes:
  liveness:
    grpc:
      port: 50051
  readiness:
    grpc:
      port: 50051

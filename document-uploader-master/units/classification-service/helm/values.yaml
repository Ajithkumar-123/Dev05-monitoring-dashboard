workloadName: classification-service
iamRoleArn: ""
image:
  repository: ""
  tag: "0.1.0"
  pullPolicy: IfNotPresent
otlp:
  endpoint: "http://grafana-alloy.observability.svc.cluster.local:4317"
  serviceNamespace: "docuploader"
environment: sandbox
replicaCount: 2
resources:
  requests: { cpu: 250m, memory: 256Mi }
  limits:   { cpu: 250m, memory: 256Mi }
extraEnv:
  - { name: CLASSIFICATION_QUEUE_URL,  valueFrom: { configMapKeyRef: { name: pipeline-queues, key: classification } } }
  - { name: CONVERT_OFFICE_QUEUE_URL,  valueFrom: { configMapKeyRef: { name: pipeline-queues, key: convert_office } } }
  - { name: CONVERT_HTML_QUEUE_URL,    valueFrom: { configMapKeyRef: { name: pipeline-queues, key: convert_html } } }
  - { name: CONVERT_IMAGE_QUEUE_URL,   valueFrom: { configMapKeyRef: { name: pipeline-queues, key: convert_image } } }
  - { name: TIFF_COG_QUEUE_URL,        valueFrom: { configMapKeyRef: { name: pipeline-queues, key: tiff_cog } } }
  - { name: OCR_DIRECT_QUEUE_URL,      valueFrom: { configMapKeyRef: { name: pipeline-queues, key: ocr_direct } } }
  - { name: EMAIL_QUEUE_URL,           valueFrom: { configMapKeyRef: { name: pipeline-queues, key: email } } }
  - { name: ARCHIVE_QUEUE_URL,         valueFrom: { configMapKeyRef: { name: pipeline-queues, key: archive } } }
  - { name: MEDIA_QUEUE_URL,           valueFrom: { configMapKeyRef: { name: pipeline-queues, key: media } } }
  - { name: SLIPSHEET_QUEUE_URL,       valueFrom: { configMapKeyRef: { name: pipeline-queues, key: slipsheet } } }

# REVIEW: PID-1-alive probe is a placeholder that passes as long as the
# worker process (PID 1) is running. Tighten to a real readiness signal
# once the worker exposes one — e.g., HTTP /healthz on a sidecar port,
# or a touch-file written after the first successful SQS poll.
probes:
  liveness:
    exec:
      command: ["/bin/sh", "-c", "kill -0 1"]
    initialDelaySeconds: 10
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 3
  readiness:
    exec:
      command: ["/bin/sh", "-c", "kill -0 1"]
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3

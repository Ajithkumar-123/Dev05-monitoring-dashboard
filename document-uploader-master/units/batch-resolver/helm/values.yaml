workloadName: batch-resolver
iamRoleArn: ""
image:
  repository: ""
  tag: "0.1.0"
  pullPolicy: IfNotPresent
otlp:
  endpoint: "http://grafana-alloy.observability.svc.cluster.local:4317"
  serviceNamespace: "docuploader"
environment: sandbox
replicaCount: 2
resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: 250m
    memory: 256Mi
extraEnv:
  - name: LISTEN_ADDR
    value: ":50052"
probes:
  liveness:
    grpc:
      port: 50052
  readiness:
    grpc:
      port: 50052

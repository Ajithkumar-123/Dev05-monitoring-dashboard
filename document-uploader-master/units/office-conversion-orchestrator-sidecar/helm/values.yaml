workloadName: office-conversion-orchestrator-sidecar
iamRoleArn: ""
image: { repository: "", tag: "0.1.0", pullPolicy: IfNotPresent }
aspose:
  image: { repository: "", tag: "0.1.0" }
otlp: { endpoint: "http://grafana-alloy.observability.svc.cluster.local:4317", serviceNamespace: "docuploader" }
environment: sandbox
replicaCount: 2
resources:
  requests: { cpu: 500m, memory: 1Gi }
  limits:   { cpu: 500m, memory: 1Gi }
asposeResources:
  requests: { cpu: 2000m, memory: 4Gi }
  limits:   { cpu: 2000m, memory: 4Gi }
extraEnv:
  - { name: CONVERT_OFFICE_QUEUE_URL,  valueFrom: { configMapKeyRef: { name: pipeline-queues, key: convert_office } } }
  - { name: PDF_PROCESSING_QUEUE_URL,  valueFrom: { configMapKeyRef: { name: pipeline-queues, key: pdf_processing } } }
  - { name: PIPELINE_BUCKET,           value: "docuploader-pipeline" }
  - { name: ASPOSE_URL,                value: "http://localhost:8081" }
  - { name: CHUNK_PAGES,               value: "10" }

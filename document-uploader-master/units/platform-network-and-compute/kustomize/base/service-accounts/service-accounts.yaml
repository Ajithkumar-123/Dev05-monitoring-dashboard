# ServiceAccounts for every docuploader workload. The IRSA annotation
# (eks.amazonaws.com/role-arn) is patched per-environment by the overlay since
# IAM role ARNs are account-specific.

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: wundergraph-router
  namespace: docuploader
  annotations:
    eks.amazonaws.com/role-arn: PATCH_ME
---
